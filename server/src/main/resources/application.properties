# SpotifyX Application Configuration

### !!!!! Uncomment this section if h2 is your default DB
# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=spotifyX
spring.jackson.serialization.fail-on-empty-beans=false

