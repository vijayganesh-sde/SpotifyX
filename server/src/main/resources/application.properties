#### Setup for PostgreSQL Database
# 1. Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/spotify_db
spring.datasource.username=srvijayganesh
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate/JPA Settings
# 'update' automatically creates tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
